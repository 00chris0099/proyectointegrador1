name: minierp_mobile
description: Mini-ERP I.E.P. La Asunción - App para Apoderados
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path_provider: ^2.1.3
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
