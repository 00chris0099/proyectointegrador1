version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: minierp-postgres
    restart: always
    environment:
      POSTGRES_DB: minierp_db
      POSTGRES_USER: minierp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U minierp_user -d minierp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minierp-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: minierp-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://minierp_user:${DB_PASSWORD}@postgres:5432/minierp_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      IMGBB_API_KEY: ${IMGBB_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-Mini-ERP <noreply@laasuncion.edu.pe>}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002,http://localhost:3003}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: minierp-admin
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3002:3002"
    depends_on:
      - backend

  mobile-web:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    container_name: minierp-mobile
    restart: always
    ports:
      - "3003:80"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n
    container_name: minierp-n8n
    restart: always
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always
    environment:
      - TZ=America/Lima
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3004:3001"

  nginx:
    image: nginx:alpine
    container_name: minierp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin
    profiles:
      - with-proxy

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  uptime-kuma_data:
